# Netlify deploy config for AB Home Solutions
# Static site — no build step needed. Netlify serves the folder as-is.

[build]
  publish = "."

# Friendly 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Basic security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Keep purchase pages and files out of search results
[[headers]]
  for = "/guide-download"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/pro-welcome"
  [headers.values]
    X-Robots-Tag = "noindex"
